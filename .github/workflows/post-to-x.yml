name: Post To X

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Postせず本文だけ確認する"
        required: false
        default: false
        type: boolean
      post_text:
        description: "任意の投稿本文。空ならテンプレートを使用"
        required: false
        type: string

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Twikit
        run: python -m pip install --upgrade pip twikit

      - name: Post to X
        env:
          TWIKIT_AUTH_INFO_1: ${{seetona_com}}
          TWIKIT_AUTH_INFO_2: ${{ secrets.TWIKIT_AUTH_INFO_2 }}
          TWIKIT_PASSWORD: ${{ z9xBq7s6BgqEDc! }}
          TWIKIT_TOTP_SECRET: ${{ secrets.TWIKIT_TOTP_SECRET }}
          TWIKIT_COOKIES_JSON: ${{ 8adea5ef6b4974fa2020b4a11932eae5afc25e5f }}
          TWIKIT_COOKIES_BASE64: ${{ 2da4fa39027eb5711ea3cf1c768c2b947f1b90ac4432cc39805fba4380a9b1939911d3f4cbb560a0522689084d35de07be835ffb80efa951e4b7fcc3922b5d46c4be5efe2051ce2d49fc79a2afffd0f2 }}
          TWIKIT_ENABLE_UI_METRICS: ${{ secrets.TWIKIT_ENABLE_UI_METRICS }}
          TWIKIT_LANGUAGE: ${{ secrets.TWIKIT_LANGUAGE }}
          X_POST_TEMPLATE: ${{ secrets.X_POST_TEMPLATE }}
          SEETONA_URL: ${{ secrets.SEETONA_URL }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_POST_TEXT: ${{ github.event.inputs.post_text }}
        run: |
          args=()
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "${INPUT_POST_TEXT}" ]; then
            args+=(--text "${INPUT_POST_TEXT}")
          fi
          python scripts/post_to_x.py "${args[@]}"
