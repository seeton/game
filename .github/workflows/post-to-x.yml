name: Post To X

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Postせず本文だけ確認する"
        required: false
        default: false
        type: boolean
      post_text:
        description: "任意の投稿本文。空ならテンプレートを使用"
        required: false
        type: string

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post to X
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_POST_TEMPLATE: ${{ secrets.X_POST_TEMPLATE }}
          SEETONA_URL: ${{ secrets.SEETONA_URL }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_POST_TEXT: ${{ github.event.inputs.post_text }}
        run: |
          args=()
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "${INPUT_POST_TEXT}" ]; then
            args+=(--text "${INPUT_POST_TEXT}")
          fi
          python scripts/post_to_x.py "${args[@]}"
