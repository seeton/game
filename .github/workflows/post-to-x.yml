name: Post To X

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Postせず本文だけ確認する"
        required: false
        default: false
        type: boolean
      post_text:
        description: "任意の投稿本文。空ならテンプレートを使用"
        required: false
        type: string

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Twikit
        run: python -m pip install --upgrade pip twikit

      - name: Post to X
        env:
          TWIKIT_AUTH_INFO_1: ${{ secrets.TWIKIT_AUTH_INFO_1 }}
          TWIKIT_AUTH_INFO_2: ${{ secrets.TWIKIT_AUTH_INFO_2 }}
          TWIKIT_PASSWORD: ${{ secrets.TWIKIT_PASSWORD }}
          TWIKIT_TOTP_SECRET: ${{ secrets.TWIKIT_TOTP_SECRET }}
          TWIKIT_COOKIES_JSON: ${{ secrets.TWIKIT_COOKIES_JSON }}
          TWIKIT_COOKIES_BASE64: ${{ secrets.TWIKIT_COOKIES_BASE64 }}
          TWIKIT_ENABLE_UI_METRICS: ${{ secrets.TWIKIT_ENABLE_UI_METRICS }}
          TWIKIT_LANGUAGE: ${{ secrets.TWIKIT_LANGUAGE }}
          X_POST_TEMPLATE: ${{ secrets.X_POST_TEMPLATE }}
          SEETONA_URL: ${{ secrets.SEETONA_URL }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_POST_TEXT: ${{ github.event.inputs.post_text }}
        run: |
          args=()
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "${INPUT_POST_TEXT}" ]; then
            args+=(--text "${INPUT_POST_TEXT}")
          fi
          python scripts/post_to_x.py "${args[@]}"
